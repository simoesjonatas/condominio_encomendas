version: '3.9'

services:
  encomenda:
    build: .
    container_name: encomenda_web
    # O WhiteNoise serve os estáticos direto pelo Gunicorn, então não precisa
    # mais do nginx. O collectstatic gera os arquivos com hash (cache-busting).
    command: >
      bash -lc "python manage.py migrate &&
                python manage.py collectstatic --noinput &&
                gunicorn condominio.wsgi:application --bind 0.0.0.0:8000"
    environment:
      # Liga o storage com hash (custom.<hash>.css) -> sem precisar limpar cache
      WHITENOISE: "True"
      # Mantenha "False" em produção. Se precisar depurar, troque para "True".
      DEBUG: "False"
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8086:8000"

volumes:
  static_volume:
